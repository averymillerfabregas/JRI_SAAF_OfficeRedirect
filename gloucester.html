<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gloucester Office</title>

<style>
  body {
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 30px;
    background: #f4f4f4;
  }

  .card {
    background: white;
    max-width: 500px;
    margin: auto;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .service-box {
    margin-top: 20px;
    padding: 15px;
    border: 2px dashed #999;
    border-radius: 10px;
    color: #555;
    text-align: left;
    min-height: 80px;
  }

  .button {
    display: block;
    margin: 12px auto;
    padding: 14px;
    width: 90%;
    max-width: 300px;
    background: #006699;
    color: white;
    text-decoration: none;
    border-radius: 8px;
    font-size: 16px;
  }

  .button:hover {
    opacity: 0.9;
  }
</style>

</head>

<body>

<div class="card">

  <h1>Gloucester Office</h1>

  <p>
    3 Blackburn Center<br>
    Gloucester, MA 01930
  </p>

  <!-- SERVICE DESCRIPTION BOX (YOU WILL EDIT LATER) -->
  <div class="service-box">
    <!-- Replace this text later with your services description -->
    <strong>Services:</strong><br>
    (Add your service description here later — e.g. office hours, programs, support details, etc.)
  </div>

  <a class="button" href="tel:+19785594312">
    Call Office
  </a>

  <a class="button" href="https://maps.google.com/?q=3+Blackburn+Center+Gloucester+MA+01930">
    Open in Google Maps
  </a>

  <a class="button" href="http://maps.apple.com/?address=3+Blackburn+Center+Gloucester+MA+01930">
    Open in Apple Maps
  </a>

</div>

</body>
</html>
