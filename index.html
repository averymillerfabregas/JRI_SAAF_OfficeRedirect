<!DOCTYPE html>
<html>
<head>
  <title>Finding your nearest office...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">

<h2>Finding your nearest office...</h2>
<p>Please wait a moment.</p>

<script>

async function redirectUser() {

  try {

    // Gets approximate location from IP
    const response = await fetch("https://ipapi.co/json/");
    const data = await response.json();

    const city = data.city?.trim().toLowerCase();

    console.log("Detected city:", city);

    // NORTH SHORE / GLOUCESTER
    if (
      city === "gloucester" ||
      city === "rockport" ||
      city === "essex"
    ) {
      window.location.href = "/gloucester.html";
    }

    // LAWRENCE AREA
    else if (
      city === "lawrence" ||
      city === "methuen" ||
      city === "andover"
    ) {
      window.location.href = "/lawrence.html";
    }

    // LYNN AREA
    else if (
      city === "lynn" ||
      city === "saugus" ||
      city === "nahant"
    ) {
      window.location.href = "/lynn.html";
    }

    // CHELMSFORD AREA
    else if (
      city === "chelmsford" ||
      city === "lowell"
    ) {
      window.location.href = "/chelmsford.html";
    }

    // ACTON / METROWEST
    else if (
      city === "acton" ||
      city === "concord" ||
      city === "maynard"
    ) {
      window.location.href = "/acton.html";
    }

    // SALEM AREA
    else if (
      city === "salem" ||
      city === "peabody" ||
      city === "beverly"
    ) {
      window.location.href = "/salem.html";
    }

    // fallback
    else {
      window.location.href = "/choose-city.html";
    }

  }

  catch (error) {

    console.log("Error:", error);

    // backup fallback
    window.location.href = "/salem.html";

  }

}

window.addEventListener("DOMContentLoaded", redirectUser);

</script>

</body>
</html>
