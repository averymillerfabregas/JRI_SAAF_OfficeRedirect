<!DOCTYPE html>
<html>
<head>
  <title>Finding your nearest office...</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family: Arial; text-align:center; padding:40px;">

<h2>Finding your nearest office...</h2>
<p>Please wait a moment.</p>

<script>
async function redirectUser() {

  try {

    // Gets approximate location from IP (no permission popup)
    const response = await fetch("https://ipapi.co/json/");
    const data = await response.json();

    const city = data.city;

    console.log("Detected city:", city);

    // ---- CITY ROUTING LOGIC ----

    if (city === "Gloucester") {
      window.location.href = "/gloucester.html";
    }

    else if (city === "Lawrence") {
      window.location.href = "/lawrence.html";
    }

    else if (city === "Lynn") {
      window.location.href = "/lynn.html";
    }

    else if (city === "Chelmsford") {
      window.location.href = "/chelmsford.html";
    }

    else if (city === "Acton") {
      window.location.href = "/acton.html";
    }

    else if (city === "Salem") {
      window.location.href = "/salem.html";
    }

    // fallback if city not recognized
    else {
      window.location.href = "/gloucester.html";
    }

  }

  catch (error) {

    console.log("Error:", error);

    // fallback if anything breaks
    window.location.href = "/gloucester.html";

  }

}

redirectUser();
</script>

</body>
</html>
